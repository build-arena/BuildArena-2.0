block_name = "Sqr Balloon"
summary = "Hot-air cube balloon for stable hover lift."
description = "A 3x3x3 cubic balloon. One attachable face is centered on each 3x3 face center of four side faces plus one end face, for 5 attachable faces total. It can generate lift to hover stably at a fixed altitude, with lift roughly equivalent to the weight force on 5.4 units of mass. It is not fireproof, and when damaged it produces flame."
