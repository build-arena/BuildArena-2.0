description = "A rectangular rocket body about 2.5 long, 1 wide, and 1 high, with three attachable faces (one on top and one on each side). After placement it freely hovers slightly above the attach face instead of forming a rigid connection, unless held by a Grabber. When triggered it produces rear thrust to launch, then after about 1.8 seconds detonates and generates both blast and fire."
descriptor = "rocket"

