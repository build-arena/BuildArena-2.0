description = "An unpowered wheel of radius 1.5 and tread thickness 1. On the tire side, four attachable faces sit at the top, bottom, left, and right around the tread; each face normal is perpendicular to both the tread surface and the wheel axis. One attachable face sits at the center of the axle end cap. On the rim at 1 unit radius from the hub center, four more attachable faces sit at the same cardinal positions; those faces lie in planes parallel to the spin axis and perpendicular to the axle end faces, so their normals lie in the wheel mid-plane. Nine attachable faces in total (4 + 4 + 1). The wheel is unpowered and rotates freely with low axle resistance."
