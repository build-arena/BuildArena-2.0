description = "A crossbow body about 0.7 high, with total body length 2.5 (extending 1 forward and 1.5 backward from the mount point) and bow-arm width 2. When triggered it launches bolts with about a 1-second firing interval, carries roughly 30 shots total, and produces recoil."
descriptor = "crossbow"

[by_id.62]
block_name = "Vacuum"
summary = "Directional vacuum module with no self-recoil."
description = "A vacuum block with the same body size and mount/orientation convention as the short-range shrapnel mortar form factor (matching nozzle and inlet placement). When triggered, it applies suction to objects within a forward region about 9 long, 3 wide, and 3 high along the facing direction. It has no self-reaction force from airflow and does not push/pull itself by intake."
descriptor = "vacuum"

