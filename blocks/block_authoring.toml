[by_id.76]
block_name = "Axle"
summary = "Constant-velocity universal joint module."
description = "A universal-joint module about 1 unit long and 0.6 in diameter, with one attachable point at the far end. The joint at the mount side can pivot freely to arbitrary angles. It transmits torque at constant angular speed: when mounted on an output shaft, the far-end attach point can swing to any direction while staying rotationally synchronized with the input side."
descriptor = ""

[by_id.77]
block_name = "Metal Jaw"
summary = "Low-friction metal trap jaw module."
description = "A half metal trap-jaw module about 1.6 wide, 1.5 long, and 0.7 high. One attachable face is at the jaw center on the side opposite the bite direction. After the machine starts, the jaw opens 90 degrees about the mount-side pivot to store energy; when triggered it snaps shut, then automatically re-opens to the armed state. Surface friction is low."
descriptor = "metal_jaw"

[by_id.78]
block_name = "Sail"
summary = "Square sail panel generating horizontal wind thrust."
description = "A square sail panel 3x3 with thickness 0.3. The mount point is at the center of the bottom edge. After mounting, one attachable face is centered on each side edge and one on the top edge, for 3 attachable faces total. The sail generates thrust only in the world-horizontal plane (no vertical thrust component). Thrust magnitude decreases as the sail tilts away from upright: it is maximal when the sail is vertical and becomes zero when the sail is laid horizontal. Not fireproof; when submerged it loses thrust."
descriptor = "sail"

[by_id.79]
block_name = "Rudder"
summary = "Hydrodynamic rudder blade module."
description = "Rudder shaft length is 1.8. Rudder blade thickness is 0.2, and the blade extends backward from the shaft with width 1. In water flow, drag is low when motion is parallel to the blade plane and high when motion is perpendicular to the blade plane."
descriptor = "rudder"

[by_id.80]
block_name = "Nautical Screw"
summary = "Wooden right-hand screw propulsion module."
description = "A wooden screw module of length 1 with outer radius 0.7, inner shaft radius 0.2, and thread height 0.5. The thread makes one full 360-degree turn per 1 unit axial length (single-start lead/pitch = 1). One attachable face is on the shaft end. When triggered in water, it rotates (slightly faster than a powered wheel) and generates axial thrust from screw-thread interaction with the medium; default spin direction can be flipped. Multiple modules can be chained end-to-end to form a longer screw. The propulsion effect is physics-based from thread-medium mechanical interaction."
descriptor = "nautical_screw"

[by_id.81]
block_name = "Paddle"
summary = "Wooden paddle blade with modest steering effect."
description = "A wooden paddle blade about 1 wide, 1.5 long, and 0.2 thick. It has no attachable faces. Its steering/deflection effect in water is weaker than the Rudder."
descriptor = "paddle"

[by_id.82]
block_name = "Buoyancy"
summary = "Small floating barrel module."
description = "A 1x1x1 small wooden barrel module with one attachable face on an end cap. When fully submerged, it provides buoyant force roughly equivalent to the weight force on 2 units of mass."
descriptor = ""

[by_id.83]
block_name = "Big Barrel"
summary = "Large floating wooden barrel module."
description = "A 3x3x3 large wooden barrel block. One attachable face is centered on each 3x3 face center of four side faces plus one end face, for 5 attachable faces total. When fully submerged, it provides buoyant force roughly equivalent to the weight force on 1.6 units of mass."
descriptor = ""

[by_id.84]
block_name = "Harpoon"
summary = "Harpoon launcher with retracting tether."
description = "A harpoon launcher with the same body geometry and mount convention as the cannon. When triggered, it fires a harpoon carrying a rope; after the harpoon hits and connects to a target, the rope is reeled in automatically. It can be fired repeatedly and has destructive impact potential."
descriptor = "harpoon"

[by_id.85]
block_name = "Corner Wooden Block"
summary = "Quarter-arc wooden corner block with perpendicular end faces."
description = "A wooden quarter-arc segment (90 degrees) with arc radius 2. The start end is a 1x1x1 cube wood section with four side attachable faces plus one end face (5 total). The terminal end is also a 1x1x1 cube section with four side attachable faces plus one end face (5 total). The whole part forms a single 90-degree bend, so the two end faces are perpendicular. Total attachable faces: 10."
descriptor = ""

[by_id.86]
block_name = "Skate Wheel"
summary = "Unpowered hard skateboard wheelset module."
description = "A wheelset module built from a pair of hard unpowered skateboard wheels of about 0.4 diameter mounted on an axle bracket. Axle height is 0.5, so wheel bottoms are about 0.7 from the mount face. After installation, total side-to-side width is 1.4 (0.7 to each side). Axle friction is low."
descriptor = "skate_wheel"

[by_id.87]
block_name = "Bouncy Pad"
summary = "Square elastic bounce pad."
description = "A 1x1 square bounce pad about 0.4 units thick. After mounting it covers a 1x1 square region on the attach face. Under impact it returns strong rebound force, but the bounce is lossy (energy is not fully preserved)."
descriptor = ""

[by_id.88]
block_name = "Fly Wheel"
summary = "Unpowered metal flywheel with very low contact and axle friction."
description = "An unpowered metal flywheel of radius 1 and thickness 0.5. One attachable face is at the center of the axle end face. Metal contact friction is very low, and axle rotational friction is also very low."
descriptor = "fly_wheel"

[by_id.89]
block_name = "Drag Block"
summary = "Air-drag bowl module."
description = "A hemispherical bowl module of diameter 1, with one attachable face on the end side. In airflow it generates high drag inward along the bowl normal (into the bowl opening). For example, if the opening faces north and the block moves north, the drag force points south."
descriptor = "drag_block"

[by_id.90]
block_name = "Booster"
summary = "Compact fuel-burning rocket engine."
description = "A 1x1x1 rocket engine with mass 1. The four side-face centers are attachable fuel-supply connection points, and the engine can also receive fuel when mounted directly on a fuel supply. It starts with 1 unit of fuel, consumes fuel while running, and produces thrust equivalent to about 24 units of mass under normal gravity."
descriptor = "booster"

[by_id.91]
block_name = "Steering Thruster"
summary = "Fuel-free paired RCS attitude thruster."
description = "An RCS thruster module about 1.4 units wide, with two small side nozzles pointing in opposite directions. Each nozzle can produce thrust equivalent to about 0.4 units of mass under normal gravity. By default it automatically stabilizes the machine body, has no attachable faces, and does not consume fuel."
descriptor = "steering_thruster"

[by_id.92]
block_name = "Fuel Barrel"
summary = "Small cubic fuel tank."
description = "A 1x1x1 cubic fuel tank. When full it stores 10 units of fuel by volume, has mass 0.5, and when empty has mass 0.25. It has five fuel-flow-capable attachable faces: the four side faces plus one end face. It explodes when exposed to impact or flame."
descriptor = ""

[by_id.93]
block_name = "Fuel Gauge"
summary = "Compact automation fuel-level gauge."
description = "A rectangular automation module 0.8 units long, 0.2 units wide, and 0.3 units high. It measures or reports fuel level and is handled like the existing automation modules."
descriptor = ""

[by_id.94]
block_name = "Grid Fin"
summary = "Foldable grid-fin stabilizer."
description = "A grid fin with length 1.8, width 1.0, thickness 0.4, and mass 0.3. In its default deployed state the control surface is perpendicular to the mount base and provides aerodynamic stability in air. It can fold closed so the control surface becomes parallel to the mount face."
descriptor = "grid_fin"

[by_id.95]
block_name = "Steering Fin"
summary = "Rotating trapezoid aerodynamic steering fin."
description = "A trapezoid aerodynamic control surface that can rotate about its install axis. Along the install axis, the upper section is 0.6 units and the lower section is 1.3 units. It produces aerodynamic effects in air."
descriptor = "steering_fin"

[by_id.96]
block_name = "Fuel Line"
summary = "Controllable fuel-transfer connector."
description = "A fuel line connector with mass 0.2. When it connects two attachable faces that both support fuel flow, it normally links the two fuel systems so the fuller system supplies fuel to the emptier system. Its total weight does not depend on span length. The line has no physical collider volume, so it does not interfere with other components, but destructive forces can cut it. Its open or closed state can be controlled."
descriptor = ""

[by_id.97]
block_name = "Parachute"
summary = "Compact deployable parachute pack."
description = "A 1x1x0.5 parachute pack with mass 0.2. When triggered, it deploys into a hemispherical parachute with radius about 1.5, providing drag while descending."
descriptor = ""

[by_id.98]
block_name = "Fuel Coupler"
summary = "Fuel-flow grabber coupler."
description = "A fuel coupler that reuses the grabber/connector form factor. Its four side faces are fuel-flow-capable attachable faces. When installed on a fuel-flow-capable face, it can transfer fuel between that face and a grabbed connected face that also supports fuel flow. It can release the connected module with some pushing force, then re-dock and grab another fuel-flow-capable face."
descriptor = "fuel_coupler"

[by_id.99]
block_name = "Fuel Barrel Big"
summary = "Large 3x3x3 fuel tank."
description = "A large 3x3x3 fuel tank. When full it stores 100 units of fuel by volume, has mass 5, and when empty has mass 1.5. The top and bottom end faces each have 9 fuel-flow-capable attach points: one face center, four inner points at (+/-0.5, +/-0.5) in the face plane, and four edge-center points at (+/-1.0, 0) and (0, +/-1.0). Each of the four side faces has 3 fuel-flow-capable attach points: the face center plus one point 1 unit above and one point 1 unit below the face center. It has 30 fuel-flow-capable attach points in total and is flammable and explosive under flame or impact."
descriptor = ""

[by_id.100]
block_name = "Space Wheel"
summary = "Powered metal rover wheel."
description = "A powered metal wheel shaped like a lunar rover wheel, with radius 1, tread width 1.5, and mass 1. It has one attachable face at the center of the axle end face, the length of its axle is 2. It uses the active rotating wheel behavior and can have its default spin direction flipped."
descriptor = ""

[by_id.101]
block_name = "Reaction Steering Block"
summary = "Powered reaction-wheel attitude-control module."
description = "A powered metal flywheel with mass 0.25, rotation radius 0.7, and thickness 0.7. It changes mechanical attitude by generating angular momentum through wheel rotation, and by default automatically compensates for attitude instability. It has no attachable faces."
descriptor = "reaction_steering_block"

[by_id.102]
block_name = "Fuel Cannon"
summary = "Fuel-consuming repeating fireball cannon."
description = "A weapon that consumes fuel as ammunition and can fire powerful fireballs repeatedly. Its lower body is a 1x1x1 fuel tank that stores 10 units of fuel by volume when full. Each shot consumes 3 units of fuel by volume. A slender cannon barrel extends 2.3 units from the tank with radius about 0.2. The centers of two opposite side faces on the tank are fuel-flow-capable attachable faces."
descriptor = "fuel_cannon"
